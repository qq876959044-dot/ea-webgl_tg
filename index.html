<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Arrow Escape</title>

    <!-- TG + TADS官方SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://w.tads.me/widget.js"></script>

    <style>
        *{margin:0;padding:0;}
        html,body{width:100vw;height:100vh;overflow:hidden;position:fixed;background:#231F20;}
        #unity-canvas{width:100vw;height:100vh;position:fixed;top:0;left:0;}
    </style>
</head>
<body>
    <canvas id="unity-canvas" width=1080 height=1920 tabindex="-1"></canvas>
    <script src="Build/webgl.loader.js"></script>

    <script>
        window.unityInstance = null;
        document.addEventListener("DOMContentLoaded", function(){
            if(window.Telegram && window.Telegram.WebApp){
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();
                Telegram.WebApp.disableVerticalSwipes();
                
                Telegram.WebApp.setHeaderColor(Telegram.WebApp.themeParams.bg_color);
            }
        });

        createUnityInstance(document.querySelector("#unity-canvas"), {
            dataUrl: "Build/webgl.data",
            frameworkUrl: "Build/webgl.framework.js",
            codeUrl: "Build/webgl.wasm",
            symbolsUrl: "Build/webgl.symbols.json",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "TheVayuputra",
            productName: "Arrow Escape",
            productVersion: "1.01.01",
            showBanner: false
        }).then((ins)=>{
            window.unityInstance = ins;
        });
    </script>
</body>
</html>

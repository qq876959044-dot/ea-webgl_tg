<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Unity WebGL Player | Arrow Escape</title>

    <!-- TG 官方SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- 🔥 TADS 官方正确SDK 按文档来 -->
    <script src="https://w.tads.me/widget.js"></script>

    <style>
        *{margin:0;padding:0;border:0;box-sizing:border-box;}
        html,body{width:100vw;height:100vh;overflow:hidden;position:fixed;background:#231F20;}
        #unity-canvas{width:100vw;height:100vh;position:fixed;top:0;left:0;background:#231F20;}
    </style>
</head>
<body style="text-align: center; padding: 0; margin: 0;">
    <canvas id="unity-canvas" width=1080 height=1920 tabindex="-1"></canvas>

    <script src="Build/webgl.loader.js"></script>
    <script>
        window.unityInstance = null;

        // TG 全屏
        document.addEventListener("DOMContentLoaded", function(){
            if(window.Telegram && window.Telegram.WebApp){
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();
                Telegram.WebApp.disableVerticalSwipes();
                Telegram.WebApp.setHeaderColor("transparent");
            }
        });

        // 启动Unity
        createUnityInstance(document.querySelector("#unity-canvas"), {
            dataUrl: "Build/webgl.data",
            frameworkUrl: "Build/webgl.framework.js",
            codeUrl: "Build/webgl.wasm",
            symbolsUrl: "Build/webgl.symbols.json",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "TheVayuputra",
            productName: "Arrow Escape",
            productVersion: "1.01.01",
            showBanner: false
        }).then((ins) => {
            window.unityInstance = ins;
        });
    </script>
</body>
</html>
